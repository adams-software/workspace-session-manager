name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvterm-dev

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Shell syntax check
        run: |
          find dsm/scripts wsm/scripts scripts -type f \( -name '*.sh' -o -name 'dsm' -o -name 'wsm' -o -name 'wsm_menu' \) -print0 | \
            xargs -0 -n1 bash -n
