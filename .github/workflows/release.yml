name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -fsSL https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad.tar.xz -o /tmp/zig.tar.xz
          mkdir -p "$HOME/.local/zig"
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvterm-dev

      - name: Build dist bundle
        run: ./scripts/build_dist.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-session-manager-linux-x86_64
          path: |
            dist/linux-x86_64/
            dist/workspace-session-manager-linux-x86_64.tar.gz

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/workspace-session-manager-linux-x86_64.tar.gz
